<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Matchday Edge Finder</title>
        <!-- We keep Tailwind via CDN for simplicity to avoid complex PostCSS setup,
         but we switch React to be bundled by Vite -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            slate: {
                                850: "#151e2e",
                                900: "#0f172a",
                                950: "#020617",
                            },
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                background-color: #0f172a; /* slate-900 */
                color: #f8fafc; /* slate-50 */
            }
            /* Custom Scrollbar */
            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            ::-webkit-scrollbar-track {
                background: #0f172a;
            }
            ::-webkit-scrollbar-thumb {
                background: #334155;
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #475569;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/index.tsx"></script>
    </body>
</html>
